<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h2>Employee Management System</h2>

        <input type="text" id="name" placeholder="Employee Name">

        <input type="text" id="empId" placeholder="Employee ID">

        <input type="number" id="salary" placeholder="Salary">

        <input type="text" id="dept" placeholder="Department">

        <div class="btn-group">
            <button id="addBtn">Add Employee</button>
            <button id="displayBtn">Display All</button>
            <button id="filterBtn">Salary > 50000</button>
            <button id="totalBtn">Total Salary</button>
            <button id="averageBtn">Average Salary</button>
            <button id="countBtn">Count Department</button>
        </div>

        <div id="result"></div>

    </div>

    <script src="main.js"></script>

</body>
</html>
